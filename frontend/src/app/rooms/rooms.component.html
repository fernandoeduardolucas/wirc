<section class="card section-stack">
  <div class="section-title">
    <h2>Salas</h2>
    <span class="muted">{{ rooms.length }} abertas</span>
  </div>

  @for (room of rooms; track room.id) {
    <button
      class="room-entry"
      [class.active]="room.id === activeRoomId"
      (click)="roomSelected.emit(room.id)"
    >
      <div>
        <strong>{{ room.name }}</strong>
        <small>{{ room.participants.join(', ') || 'Sem participantes' }}</small>
      </div>
      @if (room.unreadMessages > 0) {
        <span class="badge">{{ room.unreadMessages }}</span>
      }
    </button>
  }

  <div class="card nested-panel section-stack compact-stack">
    <div class="section-title compact-title">
      <h3>Nova sala</h3>
      <span class="muted">{{ authenticatedUser || 'autenticação necessária' }}</span>
    </div>
    <input [(ngModel)]="newRoomName" placeholder="Nome da sala" />
    <div class="checkbox-list">
      @for (user of users; track user.username) {
        <label class="checkbox-item">
          <input
            type="checkbox"
            [checked]="selectedParticipants.includes(user.displayName)"
            (change)="toggleParticipant(user.displayName, $any($event.target).checked)"
          />
          <span>{{ user.displayName }}</span>
        </label>
      }
    </div>
    <button [disabled]="!authenticatedUser" (click)="submitRoom()">Criar sala</button>
  </div>
</section>
