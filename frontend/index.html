<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat simples (frontend separado)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .card { max-width: 680px; margin: auto; border: 1px solid #ddd; border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    input { padding: 8px; width: 100%; }
    button { padding: 8px 12px; }
    ul { list-style: none; padding: 0; max-height: 280px; overflow: auto; border: 1px solid #eee; border-radius: 8px; }
    li { padding: 8px; border-bottom: 1px solid #f2f2f2; }
  </style>
</head>
<body>
<div class="card">
  <h1>Chat WebSocket</h1>
  <p>Backend Spring Boot em <code>ws://localhost:8080/ws/chat</code></p>
  <div class="row">
    <input id="user" placeholder="Seu nome" value="guest" />
  </div>
  <div class="row">
    <input id="message" placeholder="Digite a mensagem" />
    <button id="send">Enviar</button>
  </div>
  <ul id="messages"></ul>
</div>
<script>
  const ws = new WebSocket('ws://localhost:8080/ws/chat');
  const list = document.getElementById('messages');
  const userInput = document.getElementById('user');
  const messageInput = document.getElementById('message');
  const sendBtn = document.getElementById('send');

  function append(msg) {
    const li = document.createElement('li');
    li.textContent = `[${msg.user}] ${msg.message}`;
    list.prepend(li);
  }

  ws.onmessage = (event) => {
    append(JSON.parse(event.data));
  };

  sendBtn.onclick = () => {
    const message = messageInput.value.trim();
    if (!message) return;
    ws.send(JSON.stringify({ user: userInput.value || 'guest', message }));
    messageInput.value = '';
    messageInput.focus();
  };

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendBtn.click();
  });
</script>
</body>
</html>
